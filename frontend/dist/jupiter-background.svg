<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Arrière-plan spatial -->
  <defs>
    <radialGradient id="spaceBg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f051a;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="jupiterBg" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffd89b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e6a857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Fond spatial -->
  <rect width="400" height="300" fill="url(#spaceBg)" />
  
  <!-- Étoiles -->
  <circle cx="50" cy="40" r="1" fill="white" opacity="0.8" />
  <circle cx="150" cy="30" r="0.8" fill="white" opacity="0.6" />
  <circle cx="300" cy="50" r="1.2" fill="white" opacity="0.7" />
  <circle cx="350" cy="80" r="0.7" fill="white" opacity="0.5" />
  <circle cx="30" cy="150" r="0.9" fill="white" opacity="0.8" />
  <circle cx="380" cy="200" r="1.1" fill="white" opacity="0.6" />
  <circle cx="100" cy="250" r="0.8" fill="white" opacity="0.7" />
  <circle cx="320" cy="270" r="1" fill="white" opacity="0.5" />
  
  <!-- Jupiter en arrière-plan -->
  <circle cx="300" cy="150" r="80" fill="url(#jupiterBg)" opacity="0.9" />
  <ellipse cx="300" cy="130" rx="75" ry="10" fill="#d4941e" opacity="0.5" />
  <ellipse cx="300" cy="150" rx="75" ry="12" fill="#a0651b" opacity="0.6" />
  <ellipse cx="315" cy="145" rx="20" ry="15" fill="#c41e3a" opacity="0.6" />
</svg>
