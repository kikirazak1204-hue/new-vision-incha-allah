<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dégradé de Jupiter -->
  <defs>
    <radialGradient id="jupiterGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffd89b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e6a857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="gloss" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Corps de Jupiter -->
  <circle cx="100" cy="100" r="95" fill="url(#jupiterGradient)" />
  
  <!-- Bandes nuageuses horizontales -->
  <ellipse cx="100" cy="65" rx="90" ry="12" fill="#d4941e" opacity="0.6" />
  <ellipse cx="100" cy="100" rx="90" ry="15" fill="#a0651b" opacity="0.7" />
  <ellipse cx="100" cy="135" rx="90" ry="12" fill="#8b5a1e" opacity="0.6" />
  
  <!-- Grande Tache Rouge (GRS) -->
  <ellipse cx="110" cy="105" rx="25" ry="18" fill="#c41e3a" opacity="0.8" />
  <ellipse cx="112" cy="103" rx="20" ry="14" fill="#d63d4a" opacity="0.6" />
  
  <!-- Effet de brillance (gloss) -->
  <circle cx="100" cy="100" r="95" fill="url(#gloss)" />
  
  <!-- Ombre légère pour la profondeur -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#4a3a0a" stroke-width="2" opacity="0.3" />
  
  <!-- Anneaux légers (accent) -->
  <ellipse cx="100" cy="100" rx="105" ry="30" fill="none" stroke="#8b6914" stroke-width="1" opacity="0.3" />
</svg>
